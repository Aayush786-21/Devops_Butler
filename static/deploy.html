<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy - DevOps Butler</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .deploy-container { max-width: 700px; margin: 2rem auto; background: rgba(255,255,255,0.04); border-radius: 16px; padding: 2rem; box-shadow: 0 8px 32px rgba(79,70,229,0.08); }
        .deploy-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .repo-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .repo-table th, .repo-table td { border: 1px solid #ddd; padding: 0.5rem 1rem; text-align: left; }
        .repo-table tr:hover { background: rgba(139,92,246,0.08); cursor: pointer; }
        .logs-box { background: #18192b; color: #e5e7eb; border-radius: 8px; padding: 1rem; min-height: 120px; font-family: monospace; margin-top: 2rem; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .env-upload { display: flex; gap: 1rem; align-items: center; }
        .env-upload label { font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="/icons/logo.png" alt="DevOps Butler" class="logo-img">
                <span class="logo-text">DevOps Butler</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/deploy" class="nav-link active authed-link" style="display:none;">Deploy</a>
                <a href="/history" class="nav-link authed-link" style="display:none;">History</a>
                <a href="/learn" class="nav-link">Learn More</a>
                <span id="navbarUsername" style="display:none; margin-left: 1rem; font-weight: 600;"></span>
                <div class="auth-buttons">
                    <a href="/login" class="btn btn-outline">Login</a>
                    <a href="/login" class="btn btn-primary">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="deploy-container">
        <h1 style="text-align:center; margin-bottom:1.5rem;">Deploy Your Application</h1>
        <form class="deploy-form" id="deployForm">
            <div>
                <label for="githubUsername">GitHub Username</label>
                <input type="text" id="githubUsername" class="form-control" placeholder="Enter your GitHub username">
            </div>
            <div id="repoTableContainer" style="display:none;">
                <label>Public Repositories</label>
                <table class="repo-table" id="repoTable">
                    <thead><tr><th>Name</th><th>Description</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div>
                <label for="repoUrl">Repository URL</label>
                <input type="text" id="repoUrl" name="git_url" class="form-control" placeholder="https://github.com/username/repo.git" required>
            </div>
            <div class="env-upload">
                <label for="frontendEnv">Frontend .env</label>
                <input type="file" id="frontendEnv" name="frontend_env" accept=".env,text/plain">
                <label for="backendEnv">Backend .env</label>
                <input type="file" id="backendEnv" name="backend_env" accept=".env,text/plain">
            </div>
            <button type="submit" class="btn btn-primary" id="deployBtn"><i class="fas fa-rocket"></i> Deploy</button>
        </form>
        <div class="logs-box" id="logsBox" style="display:none;"></div>
    </main>
    <script src="/static/deploy.js"></script>
    <script>
        // Navbar username update (for instant feedback)
        function updateNavbarUser() {
            const username = localStorage.getItem('username');
            const navbarUsername = document.getElementById('navbarUsername');
            const authButtons = document.querySelector('.auth-buttons');
            if (username) {
                navbarUsername.textContent = `👤 ${username}`;
                navbarUsername.style.display = 'inline-block';
                if (authButtons) authButtons.style.display = 'none';
            } else {
                navbarUsername.textContent = '';
                navbarUsername.style.display = 'none';
                if (authButtons) authButtons.style.display = 'flex';
            }
        }
        updateNavbarUser();
        window.addEventListener('storage', updateNavbarUser);
    </script>
</body>
</html>
