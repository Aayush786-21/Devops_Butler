<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy - DevOps Butler</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1b3a 0%, #2d1b69 25%, #4c1d95 50%, #6b21a8 75%, #7c3aed 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .navbar {
            background: rgba(26, 27, 58, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .logo-img i {
            color: white;
            font-size: 1.2rem;
        }
        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            color: #ffffff;
            background: rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(10px);
        }
        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6);
        }
        .btn-outline {
            background: transparent;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .page-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .page-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
        }
        .deploy-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            margin: 0 auto 2rem auto;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.08);
        }
        .deploy-card h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
        }
        .form-control:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .repo-list {
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .repo-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        .repo-item:hover, .repo-item.selected {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            color: #fff;
        }
        .deploy-btn {
            width: 100%;
            margin-top: 1.5rem;
            font-size: 1.1rem;
        }
        .status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(139, 92, 246, 0.15);
            color: #fff;
            font-weight: 600;
            text-align: center;
        }
        .logs-section {
            margin-top: 2.5rem;
        }
        .logs-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .logs-header i {
            color: #a78bfa;
        }
        .logs-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
        }
        .logs-content {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            min-height: 200px;
            max-height: 350px;
            overflow-y: auto;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.98rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logs-content .log-line {
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
        }
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .deploy-card {
                padding: 1.5rem 0.5rem;
            }
            .logs-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="/icons/logo.png" alt="DevOps Butler" class="logo-img">
                <span class="logo-text">DevOps Butler</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/deploy" class="nav-link active authed-link" style="display:none;">Deploy</a>
                <a href="/projects" class="nav-link authed-link" style="display:none;">Projects</a>
                <a href="/history" class="nav-link authed-link" style="display:none;">History</a>
                <a href="/learn" class="nav-link">Learn More</a>
                <div class="auth-buttons">
                    <a href="/login" class="btn btn-outline">Login</a>
                    <a href="/login" class="btn btn-primary">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Deploy Application</h1>
            <p class="page-subtitle">Automate your deployments with a single click</p>
        </div>
        <div class="deploy-card">
            <!-- Keep all current deploy form logic here -->
            <h2>Deployment Details</h2>
            <form id="deployForm">
                <div class="form-group">
                    <label class="form-label" for="githubUsername"><i class="fab fa-github"></i> GitHub Username</label>
                    <input type="text" id="githubUsername" class="form-control" placeholder="Enter your GitHub username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="repoSearch"><i class="fas fa-search"></i> Search Repository</label>
                    <input type="text" id="repoSearch" class="form-control" placeholder="Type to search repositories...">
                    <div class="repo-list" id="repoList"></div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="branch"><i class="fas fa-code-branch"></i> Branch</label>
                    <input type="text" id="branch" class="form-control" placeholder="main" value="main">
                </div>
                <button type="submit" class="btn btn-primary deploy-btn"><i class="fas fa-rocket"></i> Deploy</button>
            </form>
            <div class="status-message" id="statusMessage" style="display:none;"></div>
        </div>
        <div class="logs-section">
            <div class="logs-header">
                <i class="fas fa-terminal"></i>
                <span class="logs-title">Deployment Logs</span>
            </div>
            <div class="logs-content" id="logsContent">
                <!-- Deployment logs will appear here -->
            </div>
        </div>
    </div>
    <script src="/static/deploy.js"></script>
    <script>
        // Force navigation for auth-buttons
        document.querySelectorAll('.auth-buttons a').forEach(btn => {
            btn.addEventListener('click', function(e) {
                window.location.href = this.getAttribute('href');
            });
        });

        // Show authed links if logged in
        function updateAuthedLinks() {
            const isLoggedIn = localStorage.getItem('token');
            const authedLinks = document.querySelectorAll('.authed-link');
            authedLinks.forEach(link => {
                link.style.display = isLoggedIn ? 'inline-block' : 'none';
            });
        }
        updateAuthedLinks();
        window.addEventListener('storage', updateAuthedLinks);
    </script>
</body>
</html>
